<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lender's Title Attendance System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="brand-icon">
          <i class="bi bi-building"></i>
        </div>
        <h2>Lender's Title</h2>
        <p>Employee Attendance System</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="Enter your email" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="loginBtn">
          <span id="loginBtnText">Sign In</span>
          <span id="loginBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </form>

      <div class="mt-4 pt-3 border-top">
        <p class="text-center text-muted mb-2" style="font-size: 12px; font-weight: 600;">DEMO CREDENTIALS</p>
        <div class="row g-2 text-center" style="font-size: 12px;">
          <div class="col-6">
            <div class="p-2 rounded" style="background: var(--gray-50);">
              <strong class="d-block">Admin</strong>
              <span class="text-muted">admin@lenderstitle.com</span>
              <span class="d-block text-muted">Pass: admin123</span>
            </div>
          </div>
          <div class="col-6">
            <div class="p-2 rounded" style="background: var(--gray-50);">
              <strong class="d-block">Employee</strong>
              <span class="text-muted">soumik@gmail.com</span>
              <span class="d-block text-muted">Pass: 123456</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
