<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance - Lender's Title</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h5><i class="bi bi-building me-2"></i>Lender's Title</h5>
      <small>Attendance System</small>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item">
        <a class="nav-link" href="/dashboard.html"><i class="bi bi-grid-1x2-fill"></i>Dashboard</a>
      </div>
      <div class="nav-item">
        <a class="nav-link active" href="/attendance.html"><i class="bi bi-clock-history"></i>Attendance</a>
      </div>
      <div class="nav-item">
        <a class="nav-link" href="/leave.html"><i class="bi bi-calendar-plus"></i>Leave</a>
      </div>
      <div class="nav-item admin-only" style="display:none;">
        <a class="nav-link" href="/ledger.html"><i class="bi bi-people-fill"></i>Ledger Master</a>
      </div>
      <div class="nav-item admin-only" style="display:none;">
        <a class="nav-link" href="/loan-types.html"><i class="bi bi-tags-fill"></i>Loan Types</a>
      </div>
      <div class="nav-item admin-only" style="display:none;">
        <a class="nav-link" href="/loan-milestones.html"><i class="bi bi-list-check"></i>Milestones</a>
      </div>
      <div class="nav-item admin-only" style="display:none;">
        <a class="nav-link" href="/loan-cases.html"><i class="bi bi-folder2-open"></i>Loan Cases</a>
      </div>
      <div class="nav-item admin-only" style="display:none;">
        <a class="nav-link" href="/followups.html"><i class="bi bi-chat-dots"></i>Follow-ups</a>
      </div>
      <div class="nav-item admin-only" style="display:none;">
        <a class="nav-link" href="/admin.html"><i class="bi bi-shield-lock-fill"></i>Admin Panel</a>
      </div>
      <div class="nav-item">
        <a class="nav-link logout-link" href="#"><i class="bi bi-box-arrow-left"></i>Logout</a>
      </div>
    </nav>
  </aside>

  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>
    <div class="topbar-right">
      <div class="employee-info">
        <span class="name" id="topbarEmployeeName"></span>
        <span class="role" id="topbarEmployeeRole"></span>
      </div>
      <div class="avatar" id="avatarText"></div>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h4>Attendance Records</h4>
      <p>View your monthly attendance history</p>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="stat-card primary-card">
          <div class="stat-icon"><i class="bi bi-calendar-check"></i></div>
          <div class="stat-label">Present</div>
          <div class="stat-value" id="statPresent">0</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card warning-card">
          <div class="stat-icon"><i class="bi bi-clock"></i></div>
          <div class="stat-label">Late</div>
          <div class="stat-value" id="statLate">0</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card danger-card">
          <div class="stat-icon"><i class="bi bi-x-circle"></i></div>
          <div class="stat-label">Absent</div>
          <div class="stat-value" id="statAbsent">0</div>
        </div>
      </div>
    </div>

    <div class="content-card">
      <div class="card-header">
        <span><i class="bi bi-calendar-month me-2"></i>Monthly Attendance</span>
        <div class="d-flex gap-2">
          <select class="form-select form-select-sm month-select" style="width:120px;" id="monthSelect"></select>
          <select class="form-select form-select-sm year-select" style="width:100px;" id="yearSelect"></select>
          <button class="btn btn-primary btn-sm btn-rounded" id="refreshBtn">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-custom">
            <thead>
              <tr>
                <th>Date</th>
                <th>Day</th>
                <th>Check In</th>
                <th>Check Out</th>
                <th>Hours</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="attendanceTableBody">
              <tr>
                <td colspan="6" class="text-center text-muted py-4">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script src="/js/attendance.js"></script>
</body>
</html>
