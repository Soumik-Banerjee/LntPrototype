<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Types - Lender's Title</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h5><i class="bi bi-building me-2"></i>Lender's Title</h5>
      <small>Attendance System</small>
    </div>
    <nav class="sidebar-nav">
    </nav>
  </aside>

  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
    <div class="topbar-right">
      <div class="employee-info">
        <span class="name" id="topbarEmployeeName"></span>
        <span class="role" id="topbarEmployeeRole"></span>
      </div>
      <div class="avatar" id="avatarText"></div>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
      <div>
        <h4>Loan Type Master</h4>
        <p>Manage categories such as personal, home, vehicle, and business loans</p>
      </div>
      <button class="btn btn-primary btn-rounded" id="addLoanTypeBtn"><i class="bi bi-plus-lg me-1"></i> Add Loan Type</button>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="stat-card primary-card">
          <div class="stat-icon"><i class="bi bi-tags"></i></div>
          <div class="stat-label">Total Types</div>
          <div class="stat-value" id="loanTypeTotal">0</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card success-card">
          <div class="stat-icon"><i class="bi bi-check-circle"></i></div>
          <div class="stat-label">Active</div>
          <div class="stat-value" id="loanTypeActive">0</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card danger-card">
          <div class="stat-icon"><i class="bi bi-x-circle"></i></div>
          <div class="stat-label">Inactive</div>
          <div class="stat-value" id="loanTypeInactive">0</div>
        </div>
      </div>
    </div>

    <div class="content-card">
      <div class="card-header">
        <span><i class="bi bi-search me-2"></i>Loan Types</span>
        <div class="d-flex gap-2 flex-wrap">
          <input type="text" class="form-control form-control-sm" id="loanTypeSearch" placeholder="Search by name or description" style="min-width:260px;">
          <select class="form-select form-select-sm" id="loanTypeStatusFilter" style="width:140px;">
            <option value="">All Status</option>
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
          <button class="btn btn-outline-primary btn-sm btn-rounded" id="refreshLoanTypesBtn"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-custom mb-0">
            <thead>
              <tr>
                <th>Order</th>
                <th>Loan Type</th>
                <th>Description</th>
                <th>Status</th>
                <th>Updated</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="loanTypeTableBody">
              <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="loanTypeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:14px;border:none;">
        <div class="modal-header" style="border-bottom:1px solid var(--gray-200);">
          <h5 class="modal-title fw-bold" id="loanTypeModalTitle">Add Loan Type</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <form id="loanTypeForm" class="form-custom">
            <input type="hidden" id="loanTypeId">
            <div class="mb-3">
              <label class="form-label">Loan Type Name</label>
              <input type="text" class="form-control" id="loanTypeName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="loanTypeDescription" rows="3"></textarea>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Sort Order</label>
                <input type="number" class="form-control" id="loanTypeSortOrder" min="1" value="1">
              </div>
              <div class="col-md-6">
                <label class="form-label">Status</label>
                <select class="form-select" id="loanTypeIsActive">
                  <option value="true">Active</option>
                  <option value="false">Inactive</option>
                </select>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer" style="border-top:1px solid var(--gray-200);">
          <button type="button" class="btn btn-light btn-rounded" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary btn-rounded" id="saveLoanTypeBtn">
            <span id="saveLoanTypeText">Save Type</span>
            <span id="saveLoanTypeSpinner" class="spinner-border spinner-border-sm d-none"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/loan-shared.js"></script>
  <script src="/js/loan-types.js"></script>
</body>
</html>
